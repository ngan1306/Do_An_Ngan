{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <h4 class="card-title mb-4">Chỉnh sửa thông tin cá nhân</h4>
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="first_name" class="form-label">Họ</label>
                                <input type="text" class="form-control" id="first_name" name="first_name" value="{{ user.first_name }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="last_name" class="form-label">Tên</label>
                                <input type="text" class="form-control" id="last_name" name="last_name" value="{{ user.last_name }}">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="bio" class="form-label">Giới thiệu</label>
                            <textarea class="form-control" id="bio" name="bio" rows="3">{{ user.bio }}</textarea>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="birth_date" class="form-label">Ngày sinh</label>
                                <input type="date" class="form-control" id="birth_date" name="birth_date" value="{{ user.birth_date|date:'Y-m-d' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="gender" class="form-label">Giới tính</label>
                                <select class="form-select" id="gender" name="gender">
                                    <option value="">Chọn giới tính</option>
                                    <option value="M" {% if user.gender == 'M' %}selected{% endif %}>Nam</option>
                                    <option value="F" {% if user.gender == 'F' %}selected{% endif %}>Nữ</option>
                                    <option value="O" {% if user.gender == 'O' %}selected{% endif %}>Khác</option>
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="location" class="form-label">Địa chỉ</label>
                            <input type="text" class="form-control" id="location" name="location" value="{{ user.location }}">
                        </div>
                        <div class="mb-3">
                            <label for="website" class="form-label">Website</label>
                            <input type="url" class="form-control" id="website" name="website" value="{{ user.website }}">
                        </div>
                        <div class="d-flex justify-content-between">
                            <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
                            <a href="{% url 'accounts:profile' %}" class="btn btn-outline-secondary">Hủy</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
