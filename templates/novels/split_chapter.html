{% extends 'base.html' %}
{% load static %}

{% block title %}Tách chương - {{ chapter.title }}{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header">
                    <h4 class="mb-0">Tách chương: {{ chapter.title }}</h4>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="split_point" class="form-label">Chọn dòng để tách chương:</label>
                            <select class="form-select" id="split_point" name="split_point" required>
                                <option value="">-- Chọn dòng --</option>
                                {% for line in chapter.content.splitlines %}
                                <option value="{{ forloop.counter }}">Dòng {{ forloop.counter }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Nội dung chương:</label>
                            <div class="border p-3 bg-light" style="max-height: 400px; overflow-y: auto;">
                                <pre class="mb-0">{{ chapter.content }}</pre>
                            </div>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'novels:chapter_detail' slug=novel.slug chapter_number=chapter.chapter_number %}" class="btn btn-secondary">Quay lại</a>
                            <button type="submit" class="btn btn-primary">Tách chương</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
